services:
  - type: web
    name: swift-dtr
    runtime: php # Changed 'env' to 'runtime'
    plan: free
    region: singapore
    buildCommand: composer install --no-dev && npm install && npm run build
    startCommand: php artisan migrate --force && apachectl -D FOREGROUND
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite # Store it inside the project folder
      - key: LOG_CHANNEL
        value: stderr
